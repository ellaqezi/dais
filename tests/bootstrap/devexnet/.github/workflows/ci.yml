name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit and detect-secrets
        run: pip install pre-commit detect-secrets

      # Layer 1: formatting, whitespace, YAML, secrets
      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      # Layer 2: loom-reed-light schema (task sections, status vocabulary, S/M sizing)
      - name: Run LOOM schema validator
        run: bash scripts/validate_loomreed_light.sh

      # Layer 3: shell script syntax
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck scripts/*.sh

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest src/ tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80
